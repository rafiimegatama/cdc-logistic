services:
  postgres:
    image: postgres:14
    container_name: cdc_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    command: >
      postgres
      -c wal_level=logical
      -c max_replication_slots=4
      -c max_wal_senders=4
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init_schema.sql:/docker-entrypoint-initdb.d/init_schema.sql
    networks:
      - cdc_network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: cdc_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - cdc_network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: cdc_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - cdc_network

  schema-registry:
    image: confluentinc/cp-schema-registry:7.4.0
    container_name: cdc_schema_registry
    depends_on:
      - kafka
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    networks:
      - cdc_network

  debezium:
    image: debezium/connect:2.4
    container_name: cdc_debezium
    depends_on:
      - kafka
      - postgres
      - schema-registry
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: debezium_configs
      OFFSET_STORAGE_TOPIC: debezium_offsets
      STATUS_STORAGE_TOPIC: debezium_statuses
    networks:
      - cdc_network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: cdc_kafka_ui
    depends_on:
      - kafka
      - schema-registry
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
    networks:
      - cdc_network

  # ── NEW: Flink JobManager ──
  flink-jobmanager:
    build: ./flink
    container_name: cdc_flink_jobmanager
    command: jobmanager
    ports:
      - "8082:8081"
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        jobmanager.memory.process.size: 1600m
        parallelism.default: 1
      GOOGLE_APPLICATION_CREDENTIALS: /opt/gcp/credentials.json
    volumes:
      - ./flink/jobs:/opt/flink/jobs
      - ./flink/checkpoints:/opt/flink/checkpoints
      - ./.env:/opt/flink/.env:ro
    networks:
      - cdc_network

  # ── NEW: Flink TaskManager ──
  flink-taskmanager:
    build: ./flink
    container_name: cdc_flink_taskmanager
    command: taskmanager
    depends_on:
      - flink-jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.memory.process.size: 1600m
        taskmanager.numberOfTaskSlots: 2
      GOOGLE_APPLICATION_CREDENTIALS: /opt/gcp/credentials.json
    volumes:
      - ./flink/jobs:/opt/flink/jobs
      - ./flink/checkpoints:/opt/flink/checkpoints
      - ./.env:/opt/flink/.env:ro
    networks:
      - cdc_network

volumes:
  postgres_data:

networks:
  cdc_network:
    driver: bridge
